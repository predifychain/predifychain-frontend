<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PredifyChain — Live Prediction Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#eef3fb;--panel:#fff;--panel2:#f7f9fe;--ink:#0f172a;--muted:#64748b;--line:rgba(15,23,42,.08);--line2:rgba(15,23,42,.12);--green:#00a86b;--red:#ef4444;--shadow:0 10px 35px rgba(15,23,42,.08);--ff:Inter,-apple-system,BlinkMacSystemFont,sans-serif;--fm:"JetBrains Mono",monospace}
html,body{background:linear-gradient(180deg,#f8fbff 0%, #edf3fb 100%);color:var(--ink);font-family:var(--ff);min-height:100vh}.page{position:relative}.nav{position:sticky;top:0;z-index:50;background:rgba(15,23,42,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
.nav-in{max-width:1400px;margin:0 auto;padding:0 20px;height:62px;display:flex;align-items:center;gap:14px}.logo{display:flex;align-items:center;gap:10px;font-weight:800;color:#fff}.logo-badge{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#3861fb,#7c3aed);display:flex;align-items:center;justify-content:center}.nav-gap{flex:1}
.pill-live{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;background:rgba(0,168,107,.14);border:1px solid rgba(0,168,107,.32);color:#59f0b7;font-size:12px;font-weight:700}.btn{border:none;border-radius:12px;padding:11px 14px;font-weight:700;font-family:var(--ff);cursor:pointer}.btn.primary{background:linear-gradient(135deg,#3861fb,#4f46e5);color:#fff}.btn.ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}
.wrap{max-width:1400px;margin:0 auto;padding:22px 20px 60px}.topstats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px}.stat .v{font-size:28px;font-weight:800}
.filters{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 14px;border-radius:999px;border:1px solid var(--line2);background:var(--panel);cursor:pointer;font-weight:700;color:#334155}.chip.on{background:#0f172a;color:#fff;border-color:#0f172a}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px;align-items:start}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}.card-top{padding:14px 16px 12px;border-bottom:1px solid var(--line)}.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.sym{font-size:20px;font-weight:800}.sub{font-size:12px;color:var(--muted);margin-top:3px}.price{font-size:26px;font-weight:800;font-family:var(--fm);margin-top:10px}.change{display:inline-flex;margin-top:8px;padding:4px 8px;border-radius:10px;font-size:12px;font-weight:700}.change.up{background:rgba(0,168,107,.1);color:var(--green)}.change.down{background:rgba(239,68,68,.1);color:var(--red)}.timer{font-family:var(--fm);font-size:13px;font-weight:700}.timer.red{color:var(--red)}.card-mid{padding:14px 16px}.q{font-size:15px;font-weight:600;margin-bottom:14px}
.odds{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.odd{border:1px solid var(--line);border-radius:14px;padding:12px}.odd .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700}.odd .p{font-size:26px;font-weight:800;margin-top:6px}.odd.yes .p{color:var(--green)}.odd.no .p{color:var(--red)}
.trade{display:grid;grid-template-columns:1fr auto;gap:10px}.trade input{width:100%;height:46px;border-radius:12px;border:1px solid var(--line2);padding:0 14px;font-size:16px;font-family:var(--fm);background:#fff}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.buy{background:linear-gradient(135deg,#059669,#16a34a);color:#fff}.sell{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.right{position:sticky;top:78px;height:calc(100vh - 78px);overflow:auto}.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px}.big{font-size:30px;font-weight:800;font-family:var(--fm)}.small{font-size:12px;color:var(--muted)}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.right{position:static;height:auto}}
</style>
</head>
<body><div class="page"><nav class="nav"><div class="nav-in"><div class="logo"><div class="logo-badge">PC</div><div>PredifyChain</div></div><div class="pill-live">LIVE</div><div class="nav-gap"></div><button class="btn ghost" id="refreshBtn">Refresh</button><button class="btn primary" id="demoBtn">Demo Login</button></div></nav><div class="wrap"><div class="topstats"><div class="stat"><div class="k">Live Markets</div><div class="v" id="statMarkets">--</div></div><div class="stat"><div class="k">Total Pool</div><div class="v" id="statPool">$0</div></div><div class="stat"><div class="k">Balance</div><div class="v" id="statBalance">$0</div></div><div class="stat"><div class="k">Mode</div><div class="v" id="statMode">Guest</div></div></div><div class="filters"><div class="chips" id="expiryChips"><button class="chip on" data-min="all">All</button><button class="chip" data-min="3">3 min</button><button class="chip" data-min="5">5 min</button><button class="chip" data-min="15">15 min</button></div></div><div class="layout"><div><div class="grid" id="marketGrid"><div>Loading markets…</div></div></div><div class="right"><div class="panel"><h3>Selected Market</h3><div class="big" id="selSymbol">—</div><div class="small" id="selQuestion">Select a market.</div><div class="row"><span>Price</span><strong id="snapPrice">—</strong></div><div class="row"><span>YES Odds</span><strong id="snapYes">—</strong></div><div class="row"><span>NO Odds</span><strong id="snapNo">—</strong></div><div class="row"><span>Time Left</span><strong id="snapTimer">—</strong></div></div></div></div></div></div>
<script>
var API_BASE="https://predifychain-server-production.up.railway.app/api";
var selectedExpiry="all", currentMarkets=[], selectedMarketId="", token="", balance=0, isDemo=false;
function fmtMoney(v){var n=Number(v||0);return "$"+n.toLocaleString("en-US",{maximumFractionDigits:2})}
function fmtPct(v){return Number(v||0).toFixed(0)+"%"}
function secsLeft(expiry){return Math.max(0,Math.floor((new Date(expiry).getTime()-Date.now())/1000))}
function fmtTimer(sec){var m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")}
function getVisible(){return currentMarkets.filter(function(m){return selectedExpiry==="all" || Number(m.duration_minutes||0)===Number(selectedExpiry)})}
function updateStats(){var visible=getVisible(), total=visible.reduce((s,m)=>s+Number(m.totalPool||0),0);document.getElementById("statMarkets").textContent=String(visible.length);document.getElementById("statPool").textContent=fmtMoney(total);document.getElementById("statBalance").textContent=fmtMoney(balance);document.getElementById("statMode").textContent=isDemo?"Demo":"Guest"}
function selectMarket(id){selectedMarketId=id;render();var m=currentMarkets.find(x=>x.id===id);if(!m)return;document.getElementById("selSymbol").textContent=m.symbol;document.getElementById("selQuestion").textContent=m.question||("Will "+m.symbol.replace("/USD","")+" be higher?");document.getElementById("snapPrice").textContent=fmtMoney(m.currentPrice);document.getElementById("snapYes").textContent=fmtPct(m.yesOdds);document.getElementById("snapNo").textContent=fmtPct(m.noOdds);document.getElementById("snapTimer").textContent=fmtTimer(secsLeft(m.expiry_time))}
async function loadMarkets(){var res=await fetch(API_BASE+"/markets?ts="+Date.now(),{cache:"no-store"});var json=await res.json();currentMarkets=json.markets||[];if(!selectedMarketId && currentMarkets.length)selectedMarketId=currentMarkets[0].id;render();selectMarket(selectedMarketId);updateStats()}
function render(){var grid=document.getElementById("marketGrid");var visible=getVisible();grid.innerHTML=visible.map(function(m){var sym=m.symbol.replace("/USD",""), sec=secsLeft(m.expiry_time), iid="amt_"+String(m.id).replace(/[^a-zA-Z0-9]/g,'');return '<div class="card '+(selectedMarketId===m.id?'sel':'')+'" onclick="selectMarket(\''+m.id+'\')"><div class="card-top"><div class="card-row"><div><div class="sym">'+sym+'</div><div class="sub">'+m.category+'</div></div><div><div class="timer '+(sec<30?'red':'')+'">'+fmtTimer(sec)+'</div><div class="sub">'+m.duration_minutes+'M expiry</div></div></div><div class="price">'+fmtMoney(m.currentPrice)+'</div><div class="change '+(Number(m.currentPrice||0)>0?'up':'down')+'">'+(Number(m.currentPrice||0)>0?'LIVE':'WAITING FEED')+'</div></div><div class="card-mid"><div class="q">'+(m.question||'Prediction')+'</div><div class="odds"><div class="odd yes"><div class="l">YES</div><div class="p">'+fmtPct(m.yesOdds)+'</div></div><div class="odd no"><div class="l">NO</div><div class="p">'+fmtPct(m.noOdds)+'</div></div></div><div class="trade"><input id="'+iid+'" type="number" min="1" step="0.01" placeholder="Amount"><button class="btn ghost" onclick="event.stopPropagation();placePrediction(\''+m.id+'\',\''+iid+'\',\'YES\')">YES</button></div><div class="actions"><button class="btn buy" onclick="event.stopPropagation();placePrediction(\''+m.id+'\',\''+iid+'\',\'YES\')">BUY YES</button><button class="btn sell" onclick="event.stopPropagation();placePrediction(\''+m.id+'\',\''+iid+'\',\'NO\')">SELL NO</button></div></div></div>'}).join('') || '<div>No markets</div>'}
async function demoLogin(){var res=await fetch(API_BASE+'/auth/demo-login',{method:'POST',headers:{'Content-Type':'application/json'}});var json=await res.json();token=json.token;balance=Number(json.user.demo_balance||0);isDemo=true;updateStats();alert('Demo account ready with $50,000');}
async function placePrediction(marketId,inputId,side){if(!token){alert('Login first.');return}var amount=Number(document.getElementById(inputId).value||0);if(!amount||amount<=0){alert('Enter valid amount');return}var res=await fetch(API_BASE+'/predictions/place',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({marketId,side,asset:'USDC',amount})});var json=await res.json();if(!res.ok){alert(json.error||'Prediction failed');return}balance=Number(json.balance||0);updateStats();loadMarkets();}
document.getElementById('demoBtn').addEventListener('click',demoLogin);
document.getElementById('refreshBtn').addEventListener('click',loadMarkets);
document.querySelectorAll('#expiryChips .chip').forEach(function(chip){chip.addEventListener('click',function(){document.querySelectorAll('#expiryChips .chip').forEach(c=>c.classList.remove('on'));chip.classList.add('on');selectedExpiry=chip.getAttribute('data-min');render();updateStats();selectMarket(selectedMarketId);})});
setInterval(function(){render();selectMarket(selectedMarketId);updateStats();},1000);
setInterval(loadMarkets,5000);
loadMarkets();
</script></body></html>
